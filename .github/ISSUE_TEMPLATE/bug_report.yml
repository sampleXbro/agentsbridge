name: Bug report
description: Something is not working correctly
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: AgentsMesh version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "22.0.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: agentsmesh.yaml (redact secrets)
