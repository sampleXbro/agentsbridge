name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  quality:
    name: Quality (Node ${{ matrix.node-version }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 20
          - os: ubuntu-latest
            node-version: 22
          - os: ubuntu-latest
            node-version: 24
          - os: macos-latest
            node-version: 22
          # Windows support is deferred — see README "Supported platforms".
          # Re-enable once cross-platform path persistence (installs.yaml,
          # canonical source paths) and tsx.cmd resolution are addressed.
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # Build BEFORE tests — `pnpm test` includes integration tests
      # (import.integration.test.ts, watch.integration.test.ts, plugin-flow,
      # generate-process-lock) that exec `dist/cli.js`. Without this build
      # they fail on a fresh CI runner with `Cannot find module dist/cli.js`.
      - name: Build
        run: pnpm build

      - name: Unit and integration tests
        run: pnpm test

      - name: E2E tests
        run: pnpm test:e2e

  coverage:
    name: Coverage & contract checks
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high

      # Coverage runs the full vitest suite, which includes integration tests
      # that exec `dist/cli.js`. Build first so those tests can find the binary.
      - name: Build
        run: pnpm build

      - name: Contract matrix
        run: pnpm test:contract

      - name: Support matrix docs match catalog
        run: pnpm matrix:verify

      - name: Coverage
        run: pnpm test:coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false

  smoke:
    name: Post-pack smoke test
    needs: quality
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Pack tarball
        run: pnpm pack

      - name: Install packed tarball globally
        run: npm install -g ./agentsmesh-*.tgz

      - name: Verify CLI entrypoints
        run: |
          agentsmesh --version
          agentsmesh --help
          amsh --version

      - name: Verify init scaffold in clean temp project
        run: |
          set -eux
          SMOKE_DIR=$(mktemp -d)
          cd "$SMOKE_DIR"
          agentsmesh init --yes
          test -f agentsmesh.yaml
          test -d .agentsmesh

      - name: publint (package metadata)
        run: pnpm publint

      - name: arethetypeswrong (types resolution under node16/bundler)
        run: pnpm attw

      - name: Consumer smoke (strict-mode TS import from packed tarball)
        run: ./scripts/consumer-smoke.sh
